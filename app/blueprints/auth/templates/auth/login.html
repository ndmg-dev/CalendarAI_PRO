{% extends "base.html" %}

{% block title %}Login — {{ app_name }}{% endblock %}

{% block body %}
<div class="login-page">
    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="login-card">
        <div class="login-brand">
            <div class="login-icon">
                <i data-lucide="sparkles"></i>
            </div>
            <h1 class="login-title">{{ app_name }}</h1>
            <p class="login-subtitle">Agendamentos inteligentes com IA</p>
        </div>

        <a href="{{ url_for('auth.google_login') }}" class="btn-google" id="btn-google-login">
            <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Entrar com Google</span>
        </a>

        <div class="login-footer">
            <p>Gerencie seus compromissos com inteligência artificial</p>
            <div class="legal-links" style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">
                <a href="{{ url_for('auth.privacy') }}" style="color: inherit; text-decoration: none;">Política de Privacidade</a>
                <span style="margin: 0 8px;">•</span>
                <a href="{{ url_for('auth.terms') }}" style="color: inherit; text-decoration: none;">Termos de Uso</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
