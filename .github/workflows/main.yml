name: CalendAI PRO CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: calendaipro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run migrations
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/calendaipro_test
        FLASK_SECRET_KEY: testing-secret
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'YWhSMVpYSnRkVzRnVkdGcG9DMEtRUzB0SUZSbGRtbGtuU0I3' }}
      run: |
        alembic upgrade head

    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/calendaipro_test
        FLASK_SECRET_KEY: testing-secret
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'YWhSMVpYSnRkVzRnVkdGcG9DMEtRUzB0SUZSbGRtbGtuU0I3' }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test' }}
        LLM_MODEL_NAME: gpt-4o-mini
      run: |
        pytest
